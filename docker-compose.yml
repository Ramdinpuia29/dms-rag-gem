services:
  redis:
    image: redis:alpine
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: ankane/pgvector:latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dms_rag
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rag-network
    # Wait for ollama to be ready, then pull only if model absent.
    entrypoint: /bin/sh -c "ollama serve & until ollama list 2>/dev/null; do sleep 1; done && ollama list | grep -q phi3:mini || ollama pull phi3:mini && wait"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      - uploads_data:/app/uploads
      - hf_cache:/root/.cache/huggingface
    networks:
      - rag-network
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/dms_rag
      - OLLAMA_URL=http://ollama:11434
      - HF_HOME=/root/.cache/huggingface
      - HF_TOKEN=${HF_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.worker.tasks worker --loglevel=info
    volumes:
      - .:/app
      - uploads_data:/app/uploads
      - hf_cache:/root/.cache/huggingface
    networks:
      - rag-network
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@postgres:5432/dms_rag
      - HF_HOME=/root/.cache/huggingface
      - HF_TOKEN=${HF_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      # worker does not call LLM — no ollama dependency

networks:
  rag-network:
    driver: bridge

volumes:
  postgres_data:
  ollama_data:
  uploads_data:
  hf_cache:
